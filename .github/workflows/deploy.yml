name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  deployments: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Require Cloudflare API token
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not available to this repository."
            echo "Grant repo access at: https://github.com/organizations/BelichickGillisMusk/settings/secrets/actions"
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Disable worker-route wrangler.toml for Pages deploy
        run: |
          if [ -f wrangler.toml ] && grep -qE '^\[\[routes\]\]|^routes\s*=' wrangler.toml; then
            mv wrangler.toml wrangler.toml.worker-routes-disabled
          fi
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@3.90.0 pages deploy dist --project-name=silverback-site
